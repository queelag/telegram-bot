name: Build
on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: Enable Corepack
        run: corepack enable
      - name: Install Dependencies
        run: pnpm install && pnpm install -D @aracna/core@latest @aracna/telegram-bot-types@latest
      - name: Test Coverage
        run: pnpm vitest run --coverage
        env:
          VITE_BOT_ID: ${{ secrets.VITE_BOT_ID }}
          VITE_BOT_NAME: ${{ secrets.VITE_BOT_NAME }}
          VITE_BOT_TOKEN: ${{ secrets.VITE_BOT_TOKEN }}
          VITE_GROUP_CHAT_ID: ${{ secrets.VITE_GROUP_CHAT_ID }}
          VITE_NGROK_AUTH_TOKEN: ${{ secrets.VITE_NGROK_AUTH_TOKEN }}
          VITE_PRIVATE_CHAT_ID: ${{ secrets.VITE_PRIVATE_CHAT_ID }}
          VITE_STRIPE_TOKEN: ${{ secrets.VITE_STRIPE_TOKEN }}
          VITE_SUPER_GROUP_CHAT_ID: ${{ secrets.VITE_SUPER_GROUP_CHAT_ID }}
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
